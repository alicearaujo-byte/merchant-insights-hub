<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchant Insights Center · Nuvemshop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-google:hover { opacity: 0.9; }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google svg { width: 20px; height: 20px; }
    .error {
      margin-top: 20px;
      font-size: 13px;
      color: #ff6b6b;
      display: none;
    }
    .loading {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      display: none;
    }
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Merchant Insights Center</h1>
    <p>Acesso restrito a colaboradores Nuvemshop.<br/>Entre com sua conta corporativa Google.</p>

    <button class="btn-google" id="btn-login" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Entrar com Google
    </button>

    <div class="loading" id="loading">Redirecionando...</div>
    <div class="error" id="error-msg"></div>
    <div class="footer">Uso interno · informações confidenciais</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABxET6MEaAO2Kobp1_RfDSs03RCoeuk3E",
     authDomain: "support-468213.firebaseapp.com",
      projectId: "support-468213",
      storageBucket: "support-468213.firebasestorage.app",
      messagingSenderId: "922386492366",
      appId: "1:922386492366:web:dc28d6fa14e00be603999f"
    };

    const ALLOWED_DOMAINS = ["tiendanube.com", "nuvemshop.com.br"];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Verifica resultado do redirect
    getRedirectResult(auth).then((result) => {
      if (result && result.user) {
        const domain = result.user.email.split("@")[1];
        if (!ALLOWED_DOMAINS.includes(domain)) {
          auth.signOut();
          showError("Acesso restrito a colaboradores Nuvemshop.");
          return;
        }
        window.location.href = "/index.html";
      }
    }).catch((err) => {
      console.error(err);
      showError("Erro ao autenticar. Tente novamente.");
    });

    // Se já está logado, redireciona
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const domain = user.email.split("@")[1];
        if (ALLOWED_DOMAINS.includes(domain)) {
          window.location.href = "/index.html";
        }
      }
    });

    window.signInWithGoogle = function() {
      const btn = document.getElementById("btn-login");
      const loading = document.getElementById("loading");
      btn.disabled = true;
      loading.style.display = "block";
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ hd: "tiendanube.com" });
      signInWithRedirect(auth, provider);
    };

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
      document.getElementById("btn-login").disabled = false;
      document.getElementById("loading").style.display = "none";
    }
  </script>
</body>
</html>
